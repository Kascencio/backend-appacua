services:
  aqua-backend:
    container_name: aqua-backend
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOCKER_IMAGE:-backned:latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${PORT:-3300}
    ports:
      - "${PORT:-3300}:${PORT:-3300}"
    networks:
      - aqua-backend-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:' + (process.env.PORT || '3300') + '/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  aqua-backend-network:
    external: true
    name: ${DOCKER_NETWORK:-aqua-backend-network}
