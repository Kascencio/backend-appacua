services:
  aqua-backend:
    container_name: aqua-backend
    build:
      context: .
      dockerfile: Dockerfile
    image: aqua-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: ${PORT:-3300}
    ports:
      - "${PORT:-3300}:${PORT:-3300}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PORT:-3300}/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
